[infra-db]
image=fedora:latest
pull=true
root=true
replace=true

# Paquetes necesarios para PostgreSQL + PostGIS
pkg=postgresql-server,postgresql-contrib,postgis,gdal,geos,proj,libpq-devel

# Volumen persistente para la base de datos
volumes=${HOME}/.local/share/dbdata:/var/lib/pgsql/data:rw

# Inicialización y arranque en una sola línea
init_hooks=bash -c 'if [ ! -f /var/lib/pgsql/data/PG_VERSION ]; then postgresql-setup --initdb; fi; if ! pg_ctl -D /var/lib/pgsql/data status > /dev/null 2>&1; then pg_ctl -D /var/lib/pgsql/data -l /tmp/postgres.log start; fi'


[dev-infra-db]
image=fedora:latest
pull=true
root=false
replace=true

# Paquetes para desarrollo backend + frontend
pkg=python3-devel,python3-pip,gdal-devel,nodejs,npm,gcc-c++

# Montar el código fuente
volumes=${HOME}/proyectos/salud-hidalgo:/work:rw

# Instalación automática de dependencias Python
init_hooks=pip3 install fastapi uvicorn pandas geopandas sqlalchemy geoalchemy2 pydantic
